<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iWrist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/header.css">
  <link rel="stylesheet" href="/styles/advertisement.css">
  <link rel="stylesheet" href="/styles/latestprdct.css">
  <link rel="stylesheet" href="/styles/general.css">
  <script src="script/script.js" defer></script>
</head>
<body>
  <!-- This is for header section -->
  <header class="header">
    <!--This is for Left section-->
    <div class="left-section">
      <img class="hamburger-menu" src="icons/hamburger-menu.svg">
    </div>
    
    <!--This is for middle section-->
    <div class="middle-section">
      <img class="logo" src="logos/iwristtop.png">
    </div>
    
    <!--This is for right section-->
    <div class="right-section">
      
      <div class="search-button">
       <img class="search-icon" src="icons/search.svg">
      </div>

      <div class="favourite-button">
       <img class="favourite-icon" src="icons/favourite.svg">
      </div>

      <div class="location-button">
        <img class="location-icon" src="icons/location.svg">
      </div>

      <div class="cart-button">
       <img class="cart-icon" src="icons/cart.svg">
      </div>
    </div>
  </header>

  <main>
  <div class="banner-wrap" id="banner">
      <div class="progress"><div class="progress-bar" id="pb"></div></div>

      <!-- Slide 1 -->
      <div class="slide active" id="s0">
        <div class="slide-inner">
          <img class="first-adv" src="advertisement/adv1.png">
        </div>
      </div>

     <!-- Slide 2 -->
     <div class="slide" id="s1">
        <div class="slide-inner" style="background: #d4f0e4;">
          <img class="second-adv" src="advertisement/adv2.png">
        </div>
     </div>

     <!-- Slide 3 -->
    <div class="slide" id="s2">
      <div class="slide-inner" style="background: lightpink;">

      </div>
   </div>


  
</div>
  <div class="dots" id="dots">
    <button class="dot active" data-i="0"></button>
    <button class="dot" data-i="1"></button>
    <button class="dot" data-i="2"></button>
  </div>
  <button class="nav-btn nav-prev" id="prev">&#8249;</button>
  <button class="nav-btn nav-next" id="next">&#8250;</button>

  <!-- Watches You May Like Section -->
<section class="recommendations">
  <h2 class="rec-title">Watches you may like</h2>
  <p class="rec-subtitle">These watches have been selected for you to add to your list of favourites.</p>

  <div class="watch-grid">

    <div class="watch-card">
      <button class="fav-btn" aria-label="Add to favourites">
        <img src="icons/favourite.svg" class="fav-icon">
      </button>
      <div class="watch-info">
        <h3>Apple Ultra 2</h3>
        <p>classic, oled, Oystersteel</p>
      </div>
      <img class="watch-img" src="/apple/appleultra2.png" alt="apple ultra 2">
    </div>

    <div class="watch-card">
      <button class="fav-btn" aria-label="Add to favourites">
        <img src="icons/favourite.svg" class="fav-icon">
      </button>
      <div class="watch-info">
        <h3>Rolex GMT master</h3>
        <p>Diamond blue, 41 mm, ruby</p>
      </div>
      <img class="watch-img" src="/rolex/rolex gmtmaster.png" alt="Rolex gmtmaster">
    </div>

    <div class="watch-card">
      <button class="fav-btn" aria-label="Add to favourites">
        <img src="icons/favourite.svg" class="fav-icon">
      </button>
      <div class="watch-info">
        <h3>Submariner Date</h3>
        <p>Oyster, 41 mm, Oystersteel and yellow gold</p>
      </div>
      <img class="watch-img" src="watches/submariner-blue.png" alt="Submariner Date blue bezel gold">
    </div>

  </div>
</section>

</main>
  
</body>
</html>
