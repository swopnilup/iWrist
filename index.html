<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iWrist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/header.css">
</head>
<body>
  <!-- This is for header section -->
  <header class="header">
    <!--This is for Left section-->
    <div class="left-section">
      <img class="hamburger-menu" src="icons/hamburger-menu.svg">
    </div>
    
    <!--This is for middle section-->
    <div class="middle-section">
      <img class="logo" src="logos/iwristtop.png">
    </div>
    
    <!--This is for right section-->
    <div class="right-section">
      
      <div class="search-button">
       <img class="search-icon" src="icons/search.svg">
      </div>

      <div class="favourite-button">
       <img class="favourite-icon" src="icons/favourite.svg">
      </div>

      <div class="location-button">
        <img class="location-icon" src="icons/location.svg">
      </div>

      <div class="cart-button">
       <img class="cart-icon" src="icons/cart.svg">
      </div>
    </div>
     


  </header>
  
</body>
</html>
